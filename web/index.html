<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Bez tego telefon renderuje stronę w szerokości desktopu i wszystko jest malutkie. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Moja Kuchnia — ciepła, prosta aplikacja na Twoje przepisy.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Moja Kuchnia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Moja Kuchnia</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Auto-aktualizacja: wykrywa nowy build (po sygnaturze service workera),
    czyści pamięć podręczną i przeładowuje raz. Dzięki temu zainstalowana
    apka (PWA) nie „zacina się" na starej wersji.
  -->
  <script>
    (function () {
      try {
        if (!('serviceWorker' in navigator) || !window.caches) return;
        var KEY = 'kuchnia_sw_sig';
        fetch('flutter_service_worker.js?ts=' + Date.now(), { cache: 'no-store' })
          .then(function (r) { return r.text(); })
          .then(function (txt) {
            var sig = 0;
            for (var i = 0; i < txt.length; i++) {
              sig = (sig * 31 + txt.charCodeAt(i)) | 0;
            }
            sig = String(sig);
            var prev = localStorage.getItem(KEY);
            localStorage.setItem(KEY, sig);
            if (prev && prev !== sig) {
              Promise.all([
                navigator.serviceWorker.getRegistrations().then(function (rs) {
                  return Promise.all(rs.map(function (x) { return x.unregister(); }));
                }),
                caches.keys().then(function (ks) {
                  return Promise.all(ks.map(function (k) { return caches.delete(k); }));
                })
              ]).then(function () { location.reload(); });
            }
          })
          .catch(function () {});
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
